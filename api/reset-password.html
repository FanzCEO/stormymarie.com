<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Reset Password | STORMY MARIE</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 30%, rgba(255,16,240,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(176,36,168,0.04) 0%, transparent 50%),
                        #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .container {
            max-width: 420px;
            width: 100%;
            margin: 20px;
            background: linear-gradient(145deg, rgba(26,13,26,0.9), rgba(17,17,17,0.95));
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,16,240,0.15);
            box-shadow: 0 0 40px rgba(255,16,240,0.08), 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff10f0, transparent);
        }
        .avatar {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b024a8, #ff10f0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem; font-weight: 700; color: #0a0a0a;
            box-shadow: 0 0 30px rgba(255,16,240,0.3);
        }
        h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #ff10f0, #b024a8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.75rem; color: #666;
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left; margin-bottom: 16px;
        }
        label {
            display: block; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px;
            color: #888; margin-bottom: 6px;
        }
        input {
            width: 100%; padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,16,240,0.12);
            border-radius: 8px; color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus {
            outline: none;
            border-color: rgba(255,16,240,0.4);
            box-shadow: 0 0 15px rgba(255,16,240,0.1);
            background: rgba(0,0,0,0.6);
        }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #ff10f0, #b024a8);
            border: none; border-radius: 8px;
            color: #fff; font-size: 0.9rem;
            font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.3s, transform 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message {
            padding: 12px; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.85rem;
            display: none;
        }
        .message.success {
            display: block;
            background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #4CAF50;
        }
        .message.error {
            display: block;
            background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.3); color: #f44336;
        }
        .footer {
            margin-top: 24px; font-size: 0.75rem; color: #555;
        }
        .footer a { color: #ff10f0; text-decoration: none; }
        .requirements {
            font-size: 0.7rem; color: #666;
            text-align: left; margin-top: 4px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">SM</div>
        <h1>Reset Password</h1>
        <div class="subtitle">Stormy Marie Admin</div>

        <div id="message" class="message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password" required minlength="8">
                <div class="requirements">Minimum 8 characters</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
            </div>
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>

        <div id="successView" class="hidden">
            <p style="margin-bottom:20px;">Your password has been reset successfully.</p>
            <a href="../admin.html" class="btn" style="display:inline-block;text-decoration:none;">Go to Login</a>
        </div>

        <div class="footer">
            <a href="../index.html">Back to site</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const messageEl = document.getElementById('message');
        const form = document.getElementById('resetForm');

        if (!token) {
            messageEl.className = 'message error';
            messageEl.textContent = 'Invalid or missing reset link. Please request a new one.';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            messageEl.className = 'message';
            messageEl.style.display = 'none';

            if (password !== confirm) {
                messageEl.className = 'message error';
                messageEl.textContent = 'Passwords do not match.';
                return;
            }

            if (password.length < 8) {
                messageEl.className = 'message error';
                messageEl.textContent = 'Password must be at least 8 characters.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/upload.php?action=reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (data.success) {
                    form.style.display = 'none';
                    document.getElementById('successView').classList.remove('hidden');
                } else {
                    messageEl.className = 'message error';
                    messageEl.textContent = data.error || 'Reset failed. The link may have expired.';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (err) {
                messageEl.className = 'message error';
                messageEl.textContent = 'Connection error. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
